<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>CS 4731 Final Project Part I</title>
    <script id="vshader" type="x-shader/x-vertex">
      attribute vec4 vPosition;
      attribute vec4 vNormal;
      attribute vec2 vTexCoord;
      uniform vec4 colorBase;

      uniform mat4 projMatrix;
      uniform mat4 modelMatrix;
      varying vec3 L, N, V, R, T;
      uniform vec4 lightPosition;
      uniform vec3 cameraPosition;
      varying vec2 fTexCoord;
      varying vec3 fCubeCoord;
      varying vec4 fColorBase;

      void main() {
        // Diffuse lighting
        vec4 nm = vNormal;
        nm.w = 1.0;
        vec3 pos = (modelMatrix * nm).xyz;
        L = normalize(lightPosition.xyz - pos);
        N = normalize(modelMatrix * vNormal).xyz;

        // Specular lighting
        V = normalize(-pos);

        // Reflection and refraction
        vec3 worldPos = (modelMatrix * vPosition).xyz;
        vec3 I = normalize(worldPos - cameraPosition);
        R = reflect(I, N);
        T = refract(I, N, 0.65);

        // Position and color
        gl_Position = projMatrix * modelMatrix * vPosition;
        fTexCoord = vTexCoord;
        fColorBase = colorBase;
        fCubeCoord = vPosition.xyz;
      }
    </script>

    <script id="fshader" type="x-shader/x-fragment">
      precision mediump float;

      uniform vec4 lightDiffuse, lightSpecular, lightAmbient;
      uniform vec4 materialDiffuse, materialSpecular, materialAmbient;
      uniform float shininess;
      varying vec3 L, N, V, R, T;
      varying vec2 fTexCoord;
      varying vec3 fCubeCoord;
      varying vec4 fColorBase;

      uniform bool hasTexture;
      uniform sampler2D tex0;
      uniform samplerCube texMap;
      uniform bool isSkybox;
      uniform bool isReflective;
      uniform bool isRefractive;

      void main() {
        // Diffuse lighting
        vec4 diffuse = lightDiffuse * materialDiffuse * dot(L, N);

        // Specular lighting
        vec3 R = 2.0 * (dot(L, N) * N) - L;
        vec4 specular = lightSpecular * materialSpecular * pow(max(dot(V, R), 0.0), shininess);

        // Ambient lighting
        vec4 ambient = lightAmbient * materialAmbient;

        vec4 fColor = fColorBase + diffuse + specular + ambient;
        if (isReflective && isRefractive) {
          vec4 reflectColor = textureCube(texMap, R);
          vec4 refractColor = textureCube(texMap, T);
          fColor = mix(refractColor, reflectColor, 0.3) + fColorBase;
          fColor.a = 0.5;
        } else if (isReflective) {
          vec4 reflectColor = textureCube(texMap, R);
          fColor = reflectColor + fColor;
        } else if (hasTexture) {
          if(isSkybox){
            fColor = textureCube(texMap, fCubeCoord);
          }
          else{
            fColor = fColor + texture2D(tex0, fTexCoord);
          }
          fColor.a = 1.0;
        }

        gl_FragColor = fColor;
      }
    </script>

    <script type="text/javascript" src="lib/webgl-utils.js"></script>
    <script type="text/javascript" src="lib/initShaders.js"></script>
    <script type="text/javascript" src="lib/MV.js"></script>

    <script type="text/javascript" src="lib/model.js"></script>
    <script type="text/javascript" src="lib/face.js"></script>
    <script type="text/javascript" src="main.js"></script>
  </head>

  <body onload="main()">

    </canvas>
  </body>
</html>
